<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星记</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #faf8f5; --card: #ffffff; --side: #f5f0eb; --text: #3c362e;
  --sub: #8b8178; --border: #e8e2d9; --accent: #e8964c; --accent2: #6b9e85;
  --danger: #d4786e; --shadow: 0 1px 3px rgba(0,0,0,.06);
  --modal-bg: #fff; --input-bg: #fafaf8;
}
[data-theme="dark"] {
  --bg: #1a1a1f; --card: #252528; --side: #1e1e22; --text: #e4e4e7;
  --sub: #90909a; --border: #35353a; --accent: #e8964c; --accent2: #6b9e85;
  --danger: #d4786e; --shadow: 0 1px 3px rgba(0,0,0,.3);
  --modal-bg: #2a2a30; --input-bg: #1e1e22;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); }
::selection { background: rgba(232,150,76,.25); }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* Login */
.login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #faf8f5 0%, #f0e8db 100%); }
.login-card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,.08); }
.login-card h1 { font-size: 26px; text-align: center; margin-bottom: 4px; color: var(--accent); }
.login-card .sub { text-align: center; font-size: 13px; color: var(--sub); margin-bottom: 24px; }
.login-card .field { margin-bottom: 14px; }
.login-card label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 4px; }
.login-card input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; background: #fafaf8; }
.login-card input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,150,76,.1); }
.login-card .phone-row { display: flex; gap: 10px; }
.login-card .phone-row input { flex: 1; }
.login-card .code-btn { white-space: nowrap; padding: 11px 16px; border-radius: 10px; border: 1.5px solid var(--accent); background: #fff8f0; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; min-width: 110px; }
.login-card .code-btn:disabled { border-color: var(--border); background: #f5f5f5; color: var(--sub); cursor: not-allowed; }
.login-card .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; margin-top: 8px; display:flex; justify-content:center; align-items:center; }
.login-card .btn.primary { background: var(--accent); color: #fff; }
.login-card .btn.primary:hover { background: #d88540; }
.login-card .toggle { text-align: center; margin-top: 14px; font-size: 13px; color: var(--sub); }
.login-card .toggle a { color: var(--accent); cursor: pointer; font-weight: 600; }
.login-card .admin-link { text-align: center; margin-top: 8px; font-size: 12px; }
.login-card .admin-link a { color: var(--sub); cursor: pointer; text-decoration: underline; }
.error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 6px; min-height: 18px; }
.success-msg { color: var(--accent2); font-size: 13px; text-align: center; margin-top: 6px; min-height: 18px; }

/* App */
.app { display: flex; height: 100vh; }
.sidebar { width: 260px; min-width: 260px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.side-head { padding: 18px 16px; font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
.side-head .badge { font-size: 11px; background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 8px; margin-left: auto; }
.cal-box { padding: 12px; }
.cal-box .ch { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 13px; margin-bottom: 8px; }
.cal-box .ch button { background: none; border: none; font-size: 14px; color: var(--sub); padding: 2px 6px; border-radius: 4px; }
.cal-box .ch button:hover { background: var(--border); }
.cal-box .cw { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 10px; color: var(--sub); margin-bottom: 2px; }
.cal-box .cd { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
.cal-box .cd span { height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; cursor: pointer; position: relative; }
.cal-box .cd span:hover { background: var(--border); }
.cal-box .cd span.other { color: #ccc; cursor: default; }
.cal-box .cd span.today { border: 2px solid var(--accent); font-weight: 700; }
.cal-box .cd span.active { background: var(--accent); color: #fff; }
.cal-box .cd span.dot::after { content: ''; position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
.side-bag { flex: 1; overflow-y: auto; padding: 8px 12px; }
.side-bag h3 { font-size: 12px; color: var(--sub); margin-bottom: 6px; padding: 0 4px; }
.bag-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.bag-item:hover { background: var(--border); }
.bag-item.active { background: var(--accent); color: #fff; }
.bag-item .cnt { margin-left: auto; font-size: 11px; background: var(--border); padding: 1px 7px; border-radius: 10px; }
.bag-item.active .cnt { background: rgba(255,255,255,.25); }
.bag-tags { display: flex; gap: 2px; margin-left: 2px; }
.bag-tags span { width: 6px; height: 6px; border-radius: 50%; }
.side-user { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
.side-user .uname { font-weight: 600; }
.side-user .urole { font-size: 10px; background: var(--accent2); color: #fff; padding: 1px 6px; border-radius: 6px; }
.side-user .logout { margin-left: auto; font-size: 12px; color: var(--sub); cursor: pointer; background: none; border: none; }
.side-user .logout:hover { color: var(--danger); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-top { padding: 18px 28px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.main-top h2 { font-size: 20px; }
.main-top h2 em { font-style: normal; color: var(--accent); }
.main-acts { display: flex; gap: 8px; align-items: center; }
.search-w { position: relative; }
.search-w input { padding: 7px 12px 7px 30px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--card); }
.search-w input:focus { outline: none; border-color: var(--accent); }
.search-w .sicon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 13px; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
.btn.primary { background: var(--accent); color: #fff; }
.btn.primary:hover { background: #d88540; }
.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn.ghost:hover { background: var(--border); }
.btn.admin-t { background: #f0e6ff; color: #7c5cbf; border: 1px solid #d4c4f0; }
.btn.admin-t.active { background: #7c5cbf; color: #fff; }
.btn.admin-exp { background: #e8f5e9; color: #388e3c; border: 1px solid #c8e6c9; }
.btn.admin-exp:hover { background: #c8e6c9; }
.type-bar { padding: 10px 28px; display: flex; gap: 6px; flex-wrap: wrap; }
.type-chip { padding: 5px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--sub); }
.type-chip:hover, .type-chip.active { border-color: var(--accent); color: var(--accent); background: #fff8f0; }
.type-chip .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; }
.rec-scroll { flex: 1; overflow-y: auto; padding: 0 28px 20px; }
.records { display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.rec-card { background: var(--card); border-radius: 10px; padding: 14px 18px; box-shadow: var(--shadow); cursor: pointer; transition: .2s; display: flex; gap: 12px; align-items: flex-start; border-left: 4px solid transparent; }
.rec-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.07); }
.rec-card.done { opacity: .55; }
.rec-card.done .rec-title { text-decoration: line-through; }
.rec-check { width: 18px; min-width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); margin-top: 3px; display: flex; align-items: center; justify-content: center; }
.rec-check:hover { border-color: var(--accent); }
.rec-check.checked { background: var(--accent2); border-color: var(--accent2); }
.rec-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }
.rec-check.working { background: #e3f2fd; border-color: #1565c0; }
.rec-check.working::after { content: '—'; color: #1565c0; font-size: 13px; font-weight: 700; }
.rec-body { flex: 1; min-width: 0; }
.rec-meta { display: flex; gap: 6px; align-items: center; margin-bottom: 2px; flex-wrap: wrap; }
.rec-type { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; display:inline-block; }
.rec-owner { font-size: 10px; background: #f0e6ff; color: #7c5cbf; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.rec-date-s { font-size: 11px; color: var(--sub); }
.rec-countdown { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.rec-countdown.upcoming { background: #e8f5e9; color: #388e3c; }
.rec-countdown.past { background: #fff3e0; color: #e65100; }
.rec-title { font-size: 14px; font-weight: 600; }
.rec-preview { font-size: 12px; color: var(--sub); margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rec-acts { display: flex; gap: 2px; opacity: 0; }
.status-bar { padding: 4px 28px 2px; display: flex; gap: 6px; }
.status-btn { padding: 4px 13px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--sub); }
.status-btn:hover, .status-btn.active { border-color: var(--accent); color: var(--accent); background: #fff8f0; }
.status-badge { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; cursor: pointer; user-select: none; }
.status-badge.todo { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
.status-badge.done { background: #e8f5e9; color: #388e3c; border: 1px solid #a5d6a7; }
.status-badge.progress { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
.todo-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; border-top: 1px dashed var(--border); padding-top: 8px; }
.todo-item { display: flex; gap: 8px; align-items: center; font-size: 13px; cursor: pointer; padding: 3px 4px; border-radius: 6px; }
.todo-item:hover { background: #faf7f2; }
.todo-item.done .todo-txt { text-decoration: line-through; color: var(--sub); }
.todo-box { width: 15px; height: 15px; min-width: 15px; border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
.todo-box.checked { background: var(--accent2); border-color: var(--accent2); }
.todo-progress { font-size: 11px; color: var(--sub); margin-top: 4px; }
.rec-card:hover .rec-acts { opacity: 1; }
.rec-act { background: none; border: none; padding: 3px 7px; border-radius: 4px; font-size: 11px; color: var(--sub); }
.rec-act:hover { background: var(--border); }
.rec-act.danger:hover { background: #fee; color: var(--danger); }
.empty { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 14px; }

/* Modal */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 200; display: flex; align-items: center; justify-content: center; }
.overlay:not(.show) { display: none; }
.modal { background: #fff; border-radius: 16px; padding: 28px; width: 520px; max-width: 92vw; max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal h3 { font-size: 18px; margin-bottom: 18px; }
.modal label { display: block; font-size: 13px; font-weight: 600; color: var(--sub); margin-bottom: 3px; margin-top: 14px; }
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal textarea, .modal select { width: 100%; padding: 9px 13px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: #fafaf8; }
.modal input:focus, .modal textarea:focus { outline: none; border-color: var(--accent); }
.modal textarea { min-height: 80px; resize: vertical; }
.modal .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.type-sel { display: flex; gap: 6px; flex-wrap: wrap; }
.type-opt { padding: 6px 13px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 2px solid var(--border); background: var(--card); }
.type-opt.selected { border-color: var(--accent); background: #fff8f0; font-weight: 600; }

@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; max-height: 220px; overflow-y: auto; padding-bottom: 8px; }
  .main-top { flex-wrap: wrap; gap: 8px; padding: 12px; }
  .main-top h2 { font-size: 14px; width: 100%; }
  .main-acts { flex-wrap: wrap; gap: 6px; }
  .main-acts .btn { font-size: 11px; padding: 6px 10px; }
  .main-acts .search-w { width: 100%; }
  .rec-scroll { padding: 0 12px 20px; }
  .type-bar { padding: 8px 12px; }
  .rec-card { padding: 12px 14px; }
  .rec-title { font-size: 13px; }
  .modal { padding: 20px; border-radius: 12px; }
  .modal h3 { font-size: 16px; }
  .login-card { width: 92%; padding: 28px 20px; }
}

/* Dark mode overrides */
[data-theme="dark"] body { background: var(--bg); }
[data-theme="dark"] .login-page { background: linear-gradient(135deg, #1a1a1f 0%, #252528 100%); }
[data-theme="dark"] .login-card, [data-theme="dark"] .modal, [data-theme="dark"] .rec-card { background: var(--card); }
[data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select { background: var(--input-bg); color: var(--text); border-color: var(--border); }
[data-theme="dark"] .type-opt { background: var(--card); }
[data-theme="dark"] .overlay { background: rgba(0,0,0,.6); }
[data-theme="dark"] .todo-item:hover { background: #35353a; }
[data-theme="dark"] .rec-act:hover { background: var(--border); }
[data-theme="dark"] .empty { color: var(--sub); }

/* Today view */
.today-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 12px 0; }
.today-card { background: var(--card); border-radius: 12px; padding: 18px 20px; box-shadow: var(--shadow); }
.today-card h3 { font-size: 13px; color: var(--sub); margin-bottom: 10px; font-weight: 500; }
.today-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.today-item:last-child { border-bottom: none; }
.today-item .ti-type { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.today-item .ti-overdue { color: var(--danger); font-weight: 600; }
.today-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-left: auto; }
.today-badge.today { background: #e8f5e9; color: #388e3c; }
.today-badge.overdue { background: #fcebeb; color: #a32d2d; }

/* Trash page */
.trash-page { padding: 20px 28px; }
.trash-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.trash-header h3 { font-size: 16px; flex:1; }

/* Template picker */
.template-pick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.tmpl-chip { padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--sub); white-space: nowrap; }
.tmpl-chip:hover, .tmpl-chip.selected { border-color: var(--accent); color: var(--accent); background: #fff8f0; }

/* Due date row */
.due-row { display: flex; gap: 8px; align-items: center; }
.due-row input { flex: 1; }
.due-row input[type="time"] { flex: 0.5; }

/* Swipe to delete */
.rec-card { position: relative; transition: transform .25s ease, opacity .25s ease; }
.rec-card.new-entry { animation: fadeInCard .4s ease both; }
@keyframes fadeInCard { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Quick add bar */
.quick-add-bar { display: flex; gap: 8px; padding: 8px 0; align-items: center; }
.quick-add-bar input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--input-bg); color: var(--text); }
.quick-add-bar input:focus { outline: none; border-color: var(--accent); }
.quick-add-bar select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; background: var(--input-bg); color: var(--text); cursor: pointer; }

/* Tag chips */
.tag-chip { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10px; background: var(--tag); color: var(--accent); margin-right: 4px; cursor: pointer; border: 1px solid transparent; }
.tag-chip:hover, .tag-chip.active { border-color: var(--accent); background: var(--accent); color: #fff; }
.tag-input { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
.tag-input input { flex: 1; min-width: 120px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--input-bg); color: var(--text); }

/* Advanced search panel */
.adv-search { display: none; flex-wrap: wrap; gap: 8px; padding: 8px 0; align-items: center; }
.adv-search.show { display: flex; }
.adv-search input, .adv-search select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; background: var(--input-bg); color: var(--text); }
.adv-search .btn-clear { font-size: 11px; color: var(--danger); cursor: pointer; background: none; border: none; }

/* Kanban board */
.kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 8px 0; min-height: 200px; }
.kanban-col { background: var(--side); border-radius: 12px; padding: 10px; }
.kanban-col h3 { font-size: 13px; font-weight: 500; margin-bottom: 8px; padding: 0 4px; }
.kanban-col .kanban-card { background: var(--card); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; border-left: 3px solid var(--accent); cursor: pointer; box-shadow: var(--shadow); }
.kanban-col .kanban-card:hover { transform: translateY(-1px); }
.kanban-col .kanban-card .kc-title { font-size: 13px; font-weight: 500; }
.kanban-col .kanban-card .kc-meta { font-size: 10px; color: var(--sub); margin-top: 2px; }
@media (max-width: 768px) { .kanban-board { grid-template-columns: 1fr; } }

/* Heatmap */
.heat-1 { background: #c8e6c9 !important; }
.heat-2 { background: #81c784 !important; }
.heat-3 { background: #4caf50 !important; }
.heat-4 { background: #388e3c !important; }
</style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="login-card">
    <h1>星记</h1>
    <p class="sub" id="loginSub">手机号登录</p>

    <!-- Login fields -->
    <div id="loginFields">
      <div class="field"><label>手机号</label><input type="tel" id="loginPhone" placeholder="输入手机号" maxlength="11" autocomplete="tel"></div>
      <div class="field"><label>密码</label><input type="password" id="loginPass" placeholder="输入密码" autocomplete="current-password"></div>
    </div>

    <!-- Register fields (hidden by default) -->
    <div id="regFields" style="display:none">
      <div class="field"><label>手机号</label><input type="tel" id="regPhone" placeholder="输入手机号" maxlength="11" autocomplete="off"></div>
      <div class="field"><label>验证码</label>
        <div class="phone-row"><input type="text" id="regCode" placeholder="6位验证码" maxlength="6" autocomplete="off"><button class="code-btn" id="regCodeBtn" onclick="sendCode('register')">获取验证码</button></div>
      </div>
      <div class="field"><label>设置密码</label><input type="password" id="regPass" placeholder="至少4位密码" autocomplete="new-password"></div>
      <div class="field"><label>昵称 <span style="font-weight:400;color:var(--sub)">（可选）</span></label><input type="text" id="regNick" placeholder="给自己起个名字" maxlength="20" autocomplete="off"></div>
    </div>

    <!-- Reset fields (hidden by default) -->
    <div id="resetFields" style="display:none">
      <div class="field"><label>手机号</label><input type="tel" id="resetPhone" placeholder="输入已注册的手机号" maxlength="11" autocomplete="off"></div>
      <div class="field"><label>验证码</label>
        <div class="phone-row"><input type="text" id="resetCode" placeholder="6位验证码" maxlength="6" autocomplete="off"><button class="code-btn" id="resetCodeBtn" onclick="sendCode('reset')">获取验证码</button></div>
      </div>
      <div class="field"><label>新密码</label><input type="password" id="resetPass" placeholder="至少4位新密码" autocomplete="new-password"></div>
    </div>

    <div class="error-msg" id="loginError"></div>
    <div class="success-msg" id="loginSuccess"></div>
    <button class="btn primary" id="loginBtn" onclick="doLogin()">登 录</button>

<script>
const API = '';
let TYPES = [];
const WD = ['日','一','二','三','四','五','六'];
const TEMPLATES = {
  meeting: { label: '📋 会议纪要', type: 'memo', title: '会议纪要', content: '参会人：\n议题：\n结论：\n下一步：' },
  shop: { label: '🛒 购物清单', type: 'todo', title: '购物清单', checklist: ['买…','买…','买…'] },
  daily: { label: '📅 每日日志', type: 'memo', title: '', content: '今天做了什么：\n学到什么：\n明天计划：' },
  book: { label: '📖 读书笔记', type: 'memo', title: '《》读书笔记', content: '核心观点：\n摘录：\n反思：' },
};
let selectedTemplate = null;

async function loadTypes() {
  try {
    const r = await fetch('/api/categories');
    const d = await r.json();
    TYPES = d.categories || [];
  } catch(e) { TYPES = []; }
}

let token = '', me = null, records = [], viewDate = null, adminView = false;
let calYear, calMonth, mode = 'login', typeFilters = new Set();
let statusFilter = null;
let todoDraft = [];
let codeTimer = null;

function toggleMode(m) {
  if (m) mode = m; else if (mode === 'login') mode = 'register'; else if (mode === 'register') mode = 'login'; else mode = 'login';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginSuccess').textContent = '';
  const isLogin = mode === 'login', isReg = mode === 'register', isReset = mode === 'reset';

  document.getElementById('loginFields').style.display = isLogin ? '' : 'none';
  document.getElementById('regFields').style.display = isReg ? '' : 'none';
  document.getElementById('resetFields').style.display = isReset ? '' : 'none';

  if (isLogin) {
    document.getElementById('loginBtn').textContent = '登 录';
    document.getElementById('loginSub').textContent = '手机号登录';
    document.getElementById('toggleText').textContent = '没有账号？';
    document.getElementById('toggleLink').textContent = '去注册';
    document.getElementById('toggleLink').onclick = () => toggleMode('register');
    document.getElementById('forgotLink').style.display = '';
  } else if (isReg) {
    document.getElementById('loginBtn').textContent = '注 册';
    document.getElementById('loginSub').textContent = '创建新账号';
    document.getElementById('toggleText').textContent = '已有账号？';
    document.getElementById('toggleLink').textContent = '去登录';
    document.getElementById('toggleLink').onclick = () => toggleMode('login');
    document.getElementById('forgotLink').style.display = 'none';
  } else if (isReset) {
    document.getElementById('loginBtn').textContent = '重置密码';
    document.getElementById('loginSub').textContent = '找回密码';
    document.getElementById('toggleText').textContent = '想起密码了？';
    document.getElementById('toggleLink').textContent = '去登录';
    document.getElementById('toggleLink').onclick = () => toggleMode('login');
    document.getElementById('forgotLink').style.display = 'none';
  }
}

async function sendCode(scene) {
  const phoneEl = scene === 'register' ? document.getElementById('regPhone') : document.getElementById('resetPhone');
  const btnEl = scene === 'register' ? document.getElementById('regCodeBtn') : document.getElementById('resetCodeBtn');
  const phone = phoneEl.value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!/^1[3-9]\d{9}$/.test(phone)) { errEl.textContent = '请输入正确的手机号'; return; }

  btnEl.disabled = true;
  try {
    const res = await fetch('/api/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone, scene }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; btnEl.disabled = false; return; }
    document.getElementById('loginSuccess').textContent = data.devCode ? '验证码已发送（开发模式：' + data.devCode + '）' : '验证码已发送';
    // Countdown
    let sec = 60;
    btnEl.textContent = sec + 's';
    if (codeTimer) clearInterval(codeTimer);
    codeTimer = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(codeTimer); btnEl.textContent = '获取验证码'; btnEl.disabled = false; }
      else btnEl.textContent = sec + 's';
    }, 1000);
  } catch(e) { errEl.textContent = '发送失败，请重试'; btnEl.disabled = false; }
}

async function doLogin() {
  const errEl = document.getElementById('loginError');
  const succEl = document.getElementById('loginSuccess');
  errEl.textContent = ''; succEl.textContent = '';

  try {
    let url, body;
    if (mode === 'login') {
      const phone = document.getElementById('loginPhone').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (!phone || !pass) { errEl.textContent = '请输入手机号和密码'; return; }
      url = '/api/login'; body = { phone, password: pass };
    } else if (mode === 'register') {
      const phone = document.getElementById('regPhone').value.trim();
      const code = document.getElementById('regCode').value.trim();
      const pass = document.getElementById('regPass').value;
      const nick = document.getElementById('regNick').value.trim();
      if (!phone || !code || !pass) { errEl.textContent = '请完整填写'; return; }
      if (pass.length < 4) { errEl.textContent = '密码至少4位'; return; }
      url = '/api/register'; body = { phone, code, password: pass, nickname: nick };
    } else if (mode === 'reset') {
      const phone = document.getElementById('resetPhone').value.trim();
      const code = document.getElementById('resetCode').value.trim();
      const pass = document.getElementById('resetPass').value;
      if (!phone || !code || !pass) { errEl.textContent = '请完整填写'; return; }
      if (pass.length < 4) { errEl.textContent = '新密码至少4位'; return; }
      url = '/api/reset-password'; body = { phone, code, password: pass };
    } else if (mode === 'admin') {
      const user = document.getElementById('adminUser').value.trim();
      const pass = document.getElementById('adminPass').value;
      if (!user || !pass) { errEl.textContent = '请输入用户名和密码'; return; }
      url = '/api/login'; body = { username: user, password: pass };
    }

    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error; return; }

    if (mode === 'reset') {
      succEl.textContent = data.msg + '，请登录';
      toggleMode('login'); return;
    }

    token = data.token; me = data.user;
    localStorage.setItem('ll_token', token);
    localStorage.setItem('ll_user', JSON.stringify(me));
    showApp();
  } catch(e) { errEl.textContent = '网络错误，请重试'; }
}

function logout() {
  localStorage.removeItem('ll_token'); localStorage.removeItem('ll_user');
  token = ''; me = null;
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('loginPhone').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginSuccess').textContent = '';
  if (codeTimer) clearInterval(codeTimer);
}

async function showApp() {
  await loadTypes();
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'flex';
  document.getElementById('sideName').textContent = me.username;
  document.getElementById('sideRole').textContent = me.role === 'admin' ? '管理员' : '用户';
  document.getElementById('roleBadge').textContent = me.role === 'admin' ? '管理' : '';
  document.getElementById('adminToggle').style.display = me.role === 'admin' ? '' : 'none';
  document.getElementById('adminExport').style.display = me.role === 'admin' ? '' : 'none';
  document.getElementById('adminImport').style.display = me.role === 'admin' ? '' : 'none';
  renderTypeBar();
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  loadRecords();
  initQuickAddBar();
}

async function loadRecords() {
  const params = new URLSearchParams();
  if (adminView) params.set('all', 'true');
  if (viewDate) params.set('date', viewDate);
  const search = document.getElementById('searchInput').value.trim();
  if (search) params.set('search', search);
  if (typeFilters.size === 1) params.set('type', [...typeFilters][0]);

  try {
    const res = await fetch(API + '/api/records?' + params, { headers: { Authorization: 'Bearer ' + token } });
    if (res.status === 401) { logout(); return; }
    records = (await res.json()).records;
  } catch(e) { records = []; }
  renderAll();
}

async function toggleAdminView() {
  adminView = !adminView;
  const btn = document.getElementById('adminToggle');
  btn.classList.toggle('active', adminView);
  btn.textContent = adminView ? '👁 查看全员 (开)' : '👁 查看全员';
  await loadRecords();
}

async function toggleTodo(id) {
  const r = records.find(r => r.id == id);
  if (!r) return;
  const next = (r.done + 1) % 3;
  await fetch(API + '/api/records/' + id, {
    method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token },
    body: JSON.stringify({ done: next })
  });
  r.done = next;
  renderRecords();
}

function parseChecklist(c) {
  if (!c) return [];
  if (Array.isArray(c)) return c;
  try { const a = JSON.parse(c); return Array.isArray(a) ? a : []; } catch(e) { return []; }
}
function recDone(r) {
  const cl = parseChecklist(r.checklist);
  return cl.length ? cl.every(x => x.done) : r.done >= 2;
}
function syncTodoSection() {
  const sel = document.querySelector('#typeSel .selected');
  const isTodo = sel && sel.dataset.type === 'todo';
  document.getElementById('todoSection').style.display = isTodo ? 'block' : 'none';
  if (isTodo) renderTodoItems();
}
function renderTodoItems() {
  const box = document.getElementById('todoItems');
  box.innerHTML = todoDraft.map((it, i) =>
    '<div style="display:flex;gap:8px;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 8px">'+
    '<span onclick="toggleTodoItem('+i+')" style="width:18px;height:18px;flex:none;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;cursor:pointer;'+(it.done?'background:var(--accent2);border-color:var(--accent2)':'')+'">'+(it.done?'✓':'')+'</span>'+
    '<input value="'+esc(it.text)+'" oninput="editTodoText('+i+',this.value)" style="flex:1;font-size:13px;border:none;background:transparent;color:var(--text);outline:none;padding:3px 0'+(it.done?';text-decoration:line-through;color:var(--sub)':'')+'">'+
    '<span onclick="removeTodoItem('+i+')" style="color:var(--danger);cursor:pointer;font-size:15px;line-height:1">✕</span>'+
    '</div>'
  ).join('');
  updateTodoProgress();
}
function addTodoItem() {
  const inp = document.getElementById('todoInput');
  const v = inp.value.trim();
  if (!v) return;
  todoDraft.push({ text: v, done: false });
  inp.value = '';
  renderTodoItems();
}
function toggleTodoItem(i) { if (todoDraft[i]) { todoDraft[i].done = !todoDraft[i].done; renderTodoItems(); } }
function editTodoText(i, val) { if (todoDraft[i]) todoDraft[i].text = val; }
function removeTodoItem(i) { todoDraft.splice(i, 1); renderTodoItems(); }
function updateTodoProgress() {
  const done = todoDraft.filter(x => x.done).length;
  document.getElementById('todoProgress').textContent = todoDraft.length ? ('已完成 '+done+' / '+todoDraft.length) : '暂无子任务，添加后可在卡片内逐项勾选';
}
async function toggleSub(id, idx) {
  const r = records.find(x => x.id == id);
  if (!r) return;
  const cl = parseChecklist(r.checklist);
  if (!cl[idx]) return;
  cl[idx].done = !cl[idx].done;
  await fetch(API + '/api/records/' + id, {
    method: 'PUT', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token },
    body: JSON.stringify({ checklist: cl })
  });
  r.checklist = JSON.stringify(cl);
  renderRecords();
}

async function saveRec() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('recTitle').value.trim();
  const date = document.getElementById('recDate').value;
  const content = document.getElementById('recContent').value.trim();
  const type = document.querySelector('#typeSel .selected')?.dataset?.type || (TYPES[0]?.id || 'todo');
  const due_date = document.getElementById('dueDate').value || null;
  const due_time = document.getElementById('dueTime').value || null;
  if (!title || !date) { alert('请填写标题和日期'); return; }
  const body = { type, title, content, date, due_date, due_time, tags: tagDraft.join(',') || null };
  if (type === 'todo') {
    body.checklist = todoDraft.filter(x => x.text && x.text.trim()).map(x => ({ text: x.text.trim(), done: !!x.done }));
  } else {
    body.checklist = null;
  }
  const url = id ? API + '/api/records/' + id : API + '/api/records';
  const method = id ? 'PUT' : 'POST';
  await fetch(url, { method, headers:{'Content-Type':'application/json', Authorization:'Bearer '+token}, body: JSON.stringify(body) });
  closeModal();
  await loadRecords();
}

async function deleteRec() {
  const id = document.getElementById('editId').value;
  if (!confirm('确定删除？')) return;
  await fetch(API + '/api/records/' + id, { method:'DELETE', headers:{Authorization:'Bearer '+token} });
  closeModal();

let barChart = null, pieChart = null;

function openStats() {
  document.getElementById('statsOverlay').classList.add('show');
  renderStats();
}

function renderStats() {
  const recs = adminView ? records : records.filter(r => !adminView || true);
  const all = records;
  document.getElementById('statsTotal').textContent = all.length;

  // Bar: monthly counts
  const months = {};
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    months[k] = 0;
  }
  all.forEach(r => {
    const k = r.date.slice(0, 7);
    if (months[k] !== undefined) months[k]++;
  });
  const barLabels = Object.keys(months).map(k => k.slice(5) + '月');
  const barData = Object.values(months);

  // Pie: type distribution
  const typeCount = {};
  all.forEach(r => { typeCount[r.type] = (typeCount[r.type] || 0) + 1; });
  const pieLabels = [], pieData = [], pieColors = [];
  TYPES.forEach(t => {
    pieLabels.push(t.icon + ' ' + t.label);
    pieData.push(typeCount[t.id] || 0);
    pieColors.push(t.color);
  });

  const barCtx = document.getElementById('chartBar').getContext('2d');
  if (barChart) barChart.destroy();
  barChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels: barLabels, datasets: [{ data: barData, backgroundColor: '#e8964c88', borderColor: '#e8964c', borderWidth: 1, borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
  });

  const pieCtx = document.getElementById('chartPie').getContext('2d');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(pieCtx, {
    type: 'doughnut',
    data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } } }
  });
}

function renderRecords() {
  let filtered = records;
  if (typeFilters.size > 0) filtered = filtered.filter(r => typeFilters.has(r.type));
  if (statusFilter) filtered = filtered.filter(r => {
    if (r.type !== 'todo') return false;
    if (statusFilter === 'done') return recDone(r);
    if (statusFilter === 'progress') {
      const cl = parseChecklist(r.checklist);
      if (cl.length) return cl.some(it => it.done) && !cl.every(it => it.done);
      return r.done === 1;
    }
    // 'todo': 待办 (无子项时 done===0, 有子项时全未完成)
    const cl = parseChecklist(r.checklist);
    return cl.length ? !cl.some(it => it.done) : r.done === 0;
  });
  const advTag = (document.getElementById('advTag')?.value || '').trim();
  if (advTag) filtered = filtered.filter(r => (r.tags || '').toLowerCase().includes(advTag.toLowerCase()));
  const df = document.getElementById('advDateFrom')?.value;
  const dt = document.getElementById('advDateTo')?.value;
  if (df) filtered = filtered.filter(r => r.date >= df);
  if (dt) filtered = filtered.filter(r => r.date <= dt);
  filtered.sort((a,b) => {
    const ad = recDone(a), bd = recDone(b);
    if (a.type==='todo'&&!ad && (b.type!=='todo'||bd)) return -1;
    if (b.type==='todo'&&!bd && (a.type!=='todo'||ad)) return 1;
    return b.date.localeCompare(a.date) || b.id - a.id;
  });
  const list = document.getElementById('recordsList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">📭 这里还空着，点「+ 新增」开始记录吧</div>'; return;
  }
  list.innerHTML = filtered.map(r => {
    const t = TYPES.find(x=>x.id===r.type) || TYPES[0] || { id:'unknown', label:'未分类', icon:'📌', color:'#7b8ea0' };
    const cl = parseChecklist(r.checklist);
    const hasCl = cl.length > 0;
    const isDone = recDone(r);
    let inner = '';
    if (hasCl) {
      inner = '<div class="todo-list">' +
        cl.map((it,i)=>'<div class="todo-item'+(it.done?' done':'')+'" onclick="event.stopPropagation();toggleSub('+r.id+','+i+')"><span class="todo-box'+(it.done?' checked':'')+'">'+(it.done?'✓':'')+'</span><span class="todo-txt">'+esc(it.text)+'</span></div>').join('') +
        '<div class="todo-progress">已完成 '+cl.filter(x=>x.done).length+' / '+cl.length+'</div>' +
        '</div>';
    }
    return '<div class="rec-card '+(isDone?'done':'')+'" style="border-left-color:'+t.color+'" onclick="openModal('+r.id+')">'+
      (r.type==='todo' && !hasCl ? '<div class="rec-check '+(r.done>=2?'checked':r.done===1?'working':'')+'" onclick="event.stopPropagation();toggleTodo('+r.id+')"></div>' : '')+
      '<div class="rec-body"><div class="rec-meta">'+
      '<span class="rec-type" style="background:'+t.color+'22;color:'+t.color+'">'+t.icon+' '+t.label+'</span>'+
      (r.type==='todo' ? '<span class="status-badge '+(isDone?'done':r.done===1?'progress':'todo')+'" '+(hasCl?'':'onclick="event.stopPropagation();toggleTodo('+r.id+')"')+'> '+(isDone?'已完成 ✓':r.done===1?'进行中':'未开始')+'</span>' : '')+
      (adminView ? '<span class="rec-owner">@'+esc(r.username)+'</span>' : '')+
      '<span class="rec-date-s">'+r.date+'</span>'+
      (r.type==='memorial' ? (()=>{const td=fmtDate(new Date());const d=r.date;const ms=Date.parse(d)-Date.parse(td);const days=Math.round(ms/86400000);if(days===0)return'<span class="rec-countdown upcoming">🎉 就是今天</span>';if(days>0)return'<span class="rec-countdown upcoming">还有 '+days+' 天</span>';return'<span class="rec-countdown past">已过 '+Math.abs(days)+' 天</span>'})() : '')+
      (r.due_date && !recDone(r) ? (()=>{const td=fmtDate(new Date());const isOverdue=r.due_date<td;return'<span class="rec-countdown '+(isOverdue?'past':'upcoming')+'" style="font-size:11px">'+(isOverdue?'⏰ 已过期':'⏰ '+r.due_date)+(r.due_time?' '+r.due_time:'')+'</span>'})() : '')+
      (r.due_date && recDone(r) ? '<span style="font-size:11px;color:var(--accent2)">✓ 已完成</span>' : '')+
      (r.tags ? r.tags.split(',').filter(Boolean).map(t=>'<span class="tag-chip" onclick="event.stopPropagation();filterByTag(\''+esc(t.trim())+'\')">#'+esc(t.trim())+'</span>').join('') : '')+
      '</div><div class="rec-title">'+esc(r.title)+'</div>'+
      (r.content ? '<div class="rec-preview">'+esc(r.content)+'</div>' : '')+
      inner+
      '</div><div class="rec-acts">'+
      '<button class="rec-act" onclick="event.stopPropagation();openModal('+r.id+')">编辑</button>'+
      '<button class="rec-act danger" onclick="event.stopPropagation();deleteRecById('+r.id+')">删除</button></div></div>';
  }).join('');
}

function getDateSet() {
  const s = new Set(); records.forEach(r => s.add(r.date)); return s;
}

function renderCalendar() {
  const now = new Date();
  const today = fmtDate(now);
  const dc = {};
  records.forEach(r => { dc[r.date] = (dc[r.date]||0) + 1; });
  const fd = new Date(calYear, calMonth, 1).getDay();
  const dim = new Date(calYear, calMonth+1, 0).getDate();
  const pdim = new Date(calYear, calMonth, 0).getDate();

  let h = '<div class="ch"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--};renderCalendar()">◀</button><span>'+calYear+'年 '+(calMonth+1)+'月</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++};renderCalendar()">▶</button></div>';
  h += '<div class="cw">'+WD.map(d=>'<span>'+d+'</span>').join('')+'</div><div class="cd">';
  for (let i=fd-1;i>=0;i--) h+='<span class="other">'+(pdim-i)+'</span>';
  for (let d=1;d<=dim;d++) {
    const ds = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const cnt = dc[ds] || 0;
    let cls = '';
    if (ds===today) cls+=' today';
    if (ds===viewDate) cls+=' active';
    if (cnt===1) cls+=' dot heat-1';
    else if (cnt===2) cls+=' dot heat-2';
    else if (cnt===3) cls+=' dot heat-3';
    else if (cnt>=4) cls+=' dot heat-4';
    h+='<span class="'+cls+'" onclick="selectDate(\''+ds+'\')"'+ (cnt?' title="'+cnt+'条记录"':'') +'>'+d+'</span>';
  }
  const rem = 7 - ((fd+dim)%7);
  if (rem<7) for (let d=1;d<=rem;d++) h+='<span class="other">'+d+'</span>';
  h+='</div>';
  document.getElementById('calWidget').innerHTML = h;
}

function renderBagList() {
  const dm = {};
  records.forEach(r => { if(!dm[r.date]) dm[r.date]=new Set(); dm[r.date].add(r.type); });
  const dates = Object.keys(dm).sort().reverse();
  const today = fmtDate(new Date());
  const yest = (d=>{d.setDate(d.getDate()-1);return fmtDate(d)})(new Date());
  let h = '<div class="bag-item '+(viewDate===null?'active':'')+'" onclick="selectDate(null)"><span>📦</span>全部<span class="cnt">'+records.length+'</span></div>';
  dates.forEach(ds => {
    const d = new Date(ds); const w = WD[d.getDay()];
    const label = ds===today?'今天':ds===yest?'昨天':(d.getMonth()+1)+'/'+d.getDate();
    const tags = [...dm[ds]].slice(0,3).map(t=>'<span style="background:'+(TYPES.find(x=>x.id===t)||{}).color+'"></span>').join('');
    const cnt = records.filter(r=>r.date===ds).length;
    h+='<div class="bag-item '+(viewDate===ds?'active':'')+'" onclick="selectDate(\''+ds+'\')"><span>📁</span>'+label+' <span style="font-size:11px;color:var(--sub)">'+w+'</span>'+(tags?'<span class="bag-tags">'+tags+'</span>':'')+'<span class="cnt">'+cnt+'</span></div>';
  });
  document.getElementById('bagList').innerHTML = h;
}

function selectDate(ds) {
  viewDate = ds;
  if (ds) {
    const [y,m] = ds.split('-');
    calYear = +y; calMonth = +m - 1;
    document.getElementById('viewTitle').innerHTML = '📁 记录袋：<em>'+ds+'</em>';

    document.getElementById('viewTitle').innerHTML = '📋 <em>全部记录</em>';
  }

}

function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s) { const e=document.createElement('div'); e.textContent=s; return e.innerHTML; }

// ── Admin: Export / Import ──
async function exportData() {
  if (!confirm('导出所有用户和记录数据？')) return;
  try {
    const res = await fetch('/api/admin/export', { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) { alert('导出失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'life-log-backup-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  } catch(e) { alert('导出失败'); }
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ 导入将覆盖所有现有数据（管理员账号除外），确定继续？')) { input.value = ''; return; }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const res = await fetch('/api/admin/import', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token }, body: JSON.stringify(data) });
    const result = await res.json();
    if (!res.ok) { alert(result.error); return; }
    alert(result.msg);
    await loadRecords();
  } catch(e) { alert('导入失败：文件格式错误'); }
  input.value = '';
}

function pickTemplate(k) {
  document.querySelectorAll('.tmpl-chip').forEach(c => c.classList.remove('selected'));
  if (!k) { selectedTemplate = null; return; }
  selectedTemplate = k;
  document.getElementById('tmpl_' + k).classList.add('selected');
  const t = TEMPLATES[k];

function applyTheme(t) {
  const root = document.documentElement;
  const v = ['--bg', '--card', '--side', '--text', '--sub', '--border', '--accent', '--accent2', '--danger'];
  const k = ['bg', 'card', 'side', 'text', 'sub', 'border', 'accent', 'accent2', 'danger'];
  const oldAttr = root.getAttribute('data-theme');
  root.setAttribute('data-theme', t.id);
  k.forEach((kk, i) => root.style.setProperty(v[i], t[kk]));
  root.style.setProperty('--shadow', '0 1px 3px ' + t.shadow);
  root.style.setProperty('--modal-bg', t.card);
  root.style.setProperty('--input-bg', t.side);
  // update tag colors in theme panel
  document.querySelectorAll('.theme-dot').forEach(el => el.classList.toggle('active', el.dataset.t === t.id));
  localStorage.setItem('ll_theme_id', t.id);
  loadRecords();
}
function renderThemePanel() {
  const panel = document.getElementById('themePanel');
  panel.innerHTML = THEMES.map(t => '<span class="theme-dot" data-t="'+t.id+'" title="'+t.label+'" onclick="event.stopPropagation();applyTheme(THEMES.find(x=>x.id===\''+t.id+'\'))" style="display:inline-block;width:24px;height:24px;border-radius:50%;background:'+t.bg+';border:2px solid '+(localStorage.getItem('ll_theme_id')===t.id?t.accent:t.border)+';cursor:pointer;box-sizing:border-box"></span>').join('');
  panel.style.display = 'flex';
}
function toggleThemePanel() {
  const p = document.getElementById('themePanel');
  if (p.style.display === 'flex') { p.style.display = 'none'; return; }
  renderThemePanel();
  setTimeout(() => document.addEventListener('click', function h(e) {
    if (!document.getElementById('themeBtn').contains(e.target)) { p.style.display = 'none'; document.removeEventListener('click', h); }
  }), 10);
}

// ── Date row toggle ──
function toggleDateRow() {
  const row = document.getElementById('dateRowCollapse');
  const label = document.getElementById('dateToggleLabel');
  const inp = document.getElementById('recDate');
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? '' : 'none';
  label.textContent = isHidden ? '收起' : (inp.value === fmtDate(new Date()) ? '今天' : inp.value);
  if (isHidden) inp.focus();
}
function toggleDueRow() {
  const row = document.getElementById('dueRowCollapse');
  const label = document.getElementById('dueToggleLabel');
  const inp = document.getElementById('dueDate');
  const hasDue = inp.value;
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? '' : 'none';
  if (isHidden) { label.textContent = '收起'; inp.focus(); }
  else label.textContent = hasDue ? inp.value : '添加';
}

// ── Today view ──
let todayMode = false, trashMode = false;
function toggleTodayView() {
  todayMode = !todayMode;
  trashMode = false;
  document.getElementById('todayBtn').classList.toggle('active', todayMode);
  if (todayMode) {
    document.getElementById('todayPanel').style.display = '';
    document.getElementById('trashPanel').style.display = 'none';
    document.getElementById('recordsPanel').style.display = 'none';
    renderToday();
  } else { viewRecords(); }
}
function renderToday() {
  const now = new Date();
  const today = fmtDate(now);
  const dueRecs = records.filter(r => r.due_date && (r.due_date === today || r.due_date < today));
  const todayRecs = records.filter(r => r.date === today);
  const memorials = records.filter(r => r.type === 'memorial');
  memorials.sort((a,b) => a.date.localeCompare(b.date));

  let h = '';
  // 到期待办
  h += '<div class="today-card"><h3>⏰ 到期提醒</h3>';
  if (dueRecs.length) {
    dueRecs.forEach(r => {
      const overdue = r.due_date < today && !recDone(r);
      h += '<div class="today-item"><span class="ti-type" style="background:'+(TYPES.find(t=>t.id===r.type)||{}).color+'22;color:'+(TYPES.find(t=>t.id===r.type)||{}).color+'">'+(TYPES.find(t=>t.id===r.type)||{}).icon+' '+(TYPES.find(t=>t.id===r.type)||{}).label+'</span>'+
        esc(r.title)+(r.due_time?' '+r.due_time:'')+
        (overdue?'<span class="today-badge overdue">已过期</span>':recDone(r)?'<span class="today-badge today">已完成</span>':'<span class="today-badge today">今天</span>')+
        '</div>';
    });
  } else h += '<div style="color:var(--sub);font-size:12px;padding:8px 0">暂无到期任务</div>';
  h += '</div>';

  // 今日新增
  h += '<div class="today-card"><h3>📝 今日记录（'+todayRecs.length+'条）</h3>';
  if (todayRecs.length) {
    todayRecs.forEach(r => {
      const t = TYPES.find(x=>x.id===r.type) || {};
      h += '<div class="today-item" onclick="openModal('+r.id+')" style="cursor:pointer"><span class="ti-type" style="background:'+(t.color||'#999')+'22;color:'+(t.color||'#999')+'">'+(t.icon||'📌')+' '+(t.label||'其他')+'</span>'+esc(r.title)+'</div>';
    });
  } else h += '<div style="color:var(--sub);font-size:12px;padding:8px 0">今天还没有记录</div>';
  h += '</div>';

  // 最近纪念日
  h += '<div class="today-card"><h3>🎂 最近纪念日</h3>';
  const near = memorials.slice(0, 5);
  if (near.length) {
    near.forEach(r => {
      const ms = Date.parse(r.date) - Date.parse(today);
      const days = Math.round(ms/86400000);
      let label = '';
      if (days===0) label = '<span class="today-badge today">就是今天!</span>';
      else if (days>0) label = '<span class="today-badge '+(days<=7?'today':'')+'">还有'+days+'天</span>';
      else label = '<span class="today-badge overdue">已过'+Math.abs(days)+'天</span>';
      h += '<div class="today-item"><span class="ti-type" style="background:#c47ba022;color:#c47ba0">📅 纪念日</span>'+esc(r.title)+label+'<span style="font-size:11px;color:var(--sub)">'+r.date+'</span></div>';
    });
  } else h += '<div style="color:var(--sub);font-size:12px;padding:8px 0">暂无纪念日</div>';
  h += '</div>';

  // 所有待办概览
  const todos = records.filter(r => r.type==='todo');
  const todoDone = todos.filter(r => recDone(r)).length;
  h += '<div class="today-card"><h3>✅ 待办进度</h3><div style="font-size:28px;font-weight:700;color:var(--accent);text-align:center;padding:10px 0">'+todoDone+'<span style="font-size:14px;color:var(--sub)"> / '+todos.length+'</span></div><div style="text-align:center;font-size:12px;color:var(--sub)">已完成 / 全部</div></div>';
  document.getElementById('todayGrid').innerHTML = h;
}

// ── Trash ──
async function viewTrash() {
  todayMode = false; trashMode = true;
  document.getElementById('todayBtn').classList.remove('active');
  document.getElementById('todayPanel').style.display = 'none';
  document.getElementById('recordsPanel').style.display = 'none';
  document.getElementById('trashPanel').style.display = '';
  document.getElementById('typeBar').style.display = 'none';
  document.getElementById('statusBar').style.display = 'none';
  try {
    const r = await fetch('/api/records?trash=true', { headers: { Authorization: 'Bearer ' + token } });
    const data = await r.json();
    const list = document.getElementById('trashList');
    if (!data.records.length) {
      list.innerHTML = '<div class="empty">🗑 回收站是空的</div>'; return;
    }
    list.innerHTML = data.records.map(r => {
      const t = TYPES.find(x=>x.id===r.type) || { label:'其他', icon:'📌', color:'#999' };
      return '<div class="rec-card" style="border-left-color:'+t.color+'"><div class="rec-body"><div class="rec-meta">'+
        '<span class="rec-type" style="background:'+t.color+'22;color:'+t.color+'">'+t.icon+' '+t.label+'</span>'+
        '<span style="font-size:11px;color:var(--sub)">删除于 '+r.deleted_at+'</span></div>'+
        '<div class="rec-title">'+esc(r.title)+'</div></div>'+
        '<div class="rec-acts" style="opacity:1"><button class="rec-act" onclick="restoreRec('+r.id+')">恢复</button><button class="rec-act danger" onclick="permDelete('+r.id+')">彻底删除</button></div></div>';
    }).join('');
  } catch(e) { document.getElementById('trashList').innerHTML = '<div class="empty">加载失败</div>'; }
}
function viewRecords() {
  todayMode = false; trashMode = false; kanbanMode = false;
  document.getElementById('todayBtn').classList.remove('active');
  document.getElementById('todayPanel').style.display = 'none';
  document.getElementById('trashPanel').style.display = 'none';
  document.getElementById('kanbanPanel').style.display = 'none';
  document.getElementById('recordsPanel').style.display = '';
  document.getElementById('typeBar').style.display = '';
  document.getElementById('statusBar').style.display = '';
  document.getElementById('quickAddBar').style.display = 'flex';
  loadRecords();
}
async function restoreRec(id) {
  await fetch('/api/records/'+id+'/restore', { method:'PUT', headers:{Authorization:'Bearer '+token} });
  viewTrash(); loadRecords();
}
async function permDelete(id) {
  if (!confirm('彻底删除后将无法恢复，确定吗？')) return;
  await fetch('/api/records/'+id+'/permanent', { method:'DELETE', headers:{Authorization:'Bearer '+token} });
  viewTrash();
}
async function emptyTrash() {
  if (!confirm('将彻底删除回收站中所有记录？')) return;
  const r = await fetch('/api/records?trash=true', { headers:{Authorization:'Bearer '+token} });
  const data = await r.json();
  for (const rec of data.records) await fetch('/api/records/'+rec.id+'/permanent', { method:'DELETE', headers:{Authorization:'Bearer '+token} });
  viewTrash();
}

// ── User export ──
async function userExport() {
  const fmt = prompt('选择导出格式：json / csv / md', 'json');
  if (!fmt || !['json','csv','md'].includes(fmt)) return;
  try {
    const res = await fetch('/api/export?format=' + fmt, { headers: { Authorization: 'Bearer ' + token } });
    if (!res.ok) { alert('导出失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'life-log-export-' + new Date().toISOString().slice(0,10) + '.' + (fmt==='md'?'md':fmt==='csv'?'csv':'json');
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  } catch(e) { alert('导出失败'); }
}

// ── Notification reminder (browser) ──
function checkDueNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') Notification.requestPermission();
  if (Notification.permission !== 'granted') return;
  const now = new Date();
  const today = fmtDate(now);
  const nowTime = String(now.getHours()).padStart(2,'0') + ':00';
  records.forEach(r => {
    if (r.due_date === today && r.due_time && r.due_time.startsWith(nowTime) && !recDone(r)) {
      new Notification('⏰ 到期待办', { body: r.title, icon: '/favicon.ico', tag: 'due-'+r.id });
    }
  });
}

// ── Tags ──
function renderTagChips() {
  const box = document.getElementById('tagChips');
  box.innerHTML = tagDraft.map((t, i) =>
    '<span class="tag-chip" style="cursor:pointer" onclick="removeTag('+i+')">#'+esc(t)+' ✕</span>'
  ).join('');
}
function addTag() {
  const inp = document.getElementById('tagInput');
  const v = inp.value.trim().replace(/^#/, '');
  if (!v || tagDraft.includes(v)) { inp.value = ''; return; }
  tagDraft.push(v);
  inp.value = '';
  renderTagChips();
}
function removeTag(i) { tagDraft.splice(i, 1); renderTagChips(); }
function filterByTag(tag) {
  document.getElementById('advTag').value = tag;
  document.getElementById('advSearch').classList.add('show');

}

// ── Kanban ──
let kanbanMode = false;
function toggleKanban() {
  kanbanMode = !kanbanMode;
  todayMode = false; trashMode = false;
  document.getElementById('todayPanel').style.display = 'none';
  document.getElementById('trashPanel').style.display = 'none';
  document.getElementById('recordsPanel').style.display = kanbanMode ? 'none' : '';
  document.getElementById('kanbanPanel').style.display = kanbanMode ? '' : 'none';
  document.getElementById('typeBar').style.display = kanbanMode ? 'none' : '';
  document.getElementById('statusBar').style.display = kanbanMode ? 'none' : '';
  document.getElementById('quickAddBar').style.display = kanbanMode ? 'none' : '';
  if (kanbanMode) renderKanban();
  else loadRecords();
}
function renderKanban() {
  const todos = records.filter(r => r.type === 'todo' && !r.deleted_at);
  const cols = {
    pending: { title: '📌 待办', items: todos.filter(r => !parseChecklist(r.checklist).some(it=>it.done) && r.done === 0) },
    progress: { title: '🔄 进行中', items: todos.filter(r => {
      const cl = parseChecklist(r.checklist);
      if (cl.length) return cl.some(it => it.done) && !cl.every(it => it.done);
      return r.done === 1;
    })},
    done: { title: '✅ 已完成', items: todos.filter(r => recDone(r)) }
  };
  document.getElementById('kanbanBoard').innerHTML = Object.entries(cols).map(([key, col]) =>
    '<div class="kanban-col"><h3>'+col.title+' ('+col.items.length+')</h3>'+
    col.items.map(r => '<div class="kanban-card" onclick="openModal('+r.id+')" ondblclick="cycleKanbanStatus('+r.id+')"><div class="kc-title">'+esc(r.title)+'</div>'+(r.content?'<div class="kc-meta">'+esc(r.content).slice(0,40)+'</div>':'')+'</div>').join('')+
    '</div>'
  ).join('');
}
async function cycleKanbanStatus(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  const hasSub = parseChecklist(r.checklist).length > 0;
  if (hasSub) {
    // cycle: pending(no done sub) -> progress(some done) -> done(all done)
    const cl = parseChecklist(r.checklist);
    if (cl.every(it => it.done)) { cl.forEach(it => it.done = false); } // back to pending
    else if (cl.some(it => it.done)) { cl.forEach(it => it.done = true); } // all done
    else { cl[0].done = true; } // one done -> progress
    await fetch(API + '/api/records/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ checklist: cl })
    });
  } else {
    const next = (r.done + 1) % 3;
    await fetch(API + '/api/records/' + id, {
      method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ done: next })
    });
  }
  await loadRecords();
  renderKanban();
}

(async function checkAdminGoto() {
  const p = new URLSearchParams(location.search);
  const at = p.get('admin_goto');
  if (!at) return;
  try {
    const r = await fetch('/api/goto-admin', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token:at }) });
    if (!r.ok) { history.replaceState(null,'',location.pathname); return; }
    const d = await r.json();
    token = d.token; me = d.user;
    localStorage.setItem('ll_token', token);
    localStorage.setItem('ll_user', JSON.stringify(me));
    history.replaceState(null,'',location.pathname);
    const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth();
    showApp();
  } catch(e) { history.replaceState(null,'',location.pathname); }
})();
